config.project.intro.description=Project-specific configuration. For an easy start, you can use one of the existing presets.
config.project.intro.documentation-link=Fore more information, see the documentation.

config.project.preset.label=Preset
config.project.preset.tooltip=Selection of predefined configuration settings. These can be further refined after selection.

config.project.common.title=Common Configuration
config.project.common.editor-assistance.label=Editor assistance
config.project.common.editor-assistance.tooltip=Activates editor assistance features (e.g., reference, auto-complete, folding).
config.project.common.sorting.label=Sort translation keys alphabetically
config.project.common.sorting.tooltip=Translation keys are displayed and stored in sorted order. If disabled, the original key-order is kept.
config.project.common.preview-locale.label=Preview locale
config.project.common.preview-locale.tooltip=Locale to be used for development and preview. Resources configuration must define the specified locale.

config.project.modules.title=Modules Configuration
config.project.modules.add.label=Add new module
config.project.modules.add.placeholder=E.g. frontend
config.project.modules.add.tooltip=A unique name that identifies this module. Will be used to construct the absolute translation key.
config.project.modules.remove.tooltip=Remove this module.
config.project.modules.empty=No modules have been configured yet. Add a new module above to get started.
config.project.modules.item.resource.title=Resource Configuration
config.project.modules.item.path.label=Path template
config.project.modules.item.path.tooltip=Defines the template syntax under which the translation files can be found. See the documentation for possible placeholder values.
config.project.modules.item.file.label=File template
config.project.modules.item.file.tooltip=Defines the template syntax of the translation files. See the documentation for possible placeholder values.
config.project.modules.item.key.label=Key template
config.project.modules.item.key.tooltip=Defines the template syntax of how the translation keys are assembled.
config.project.modules.item.dir.label=Root directory
config.project.modules.item.dir.tooltip=Defines the root directory for which this module is responsible for translations.
config.project.modules.item.editor.title=Editor Configuration
config.project.modules.item.default-namespace.label=Default namespace
config.project.modules.item.default-namespace.tooltip=Specifies the namespace to use by default if none is specified in a translation key. The field can be left blank to ignore this feature.
config.project.modules.item.i18n-template.label=I18n flavor template
config.project.modules.item.i18n-template.tooltip=Specifies how to replace strings with i18n representation.
config.project.modules.item.key-naming-convention.label=Key naming convention
config.project.modules.item.key-naming-convention.tooltip=Choose the naming convention to use for translation key extraction.

config.project.ext-mapper.title=File Extension Mapper
config.project.ext-mapper.item.tooltip=Comma-separated list of file extensions for which this mapper should be used. Can be empty to ignore this mapper.
